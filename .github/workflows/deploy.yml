name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 強制啟用 Node 24 預覽環境（解決警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 這裡可以維持 20 (專案版本)，Action 會自動用 Node 24 容器來跑它
          node-version: '20' 
          cache: 'npm'

      - name: Install dependencies
        # 使用 npm ci 確保環境一致
        run: npm ci

      - name: Build
        # 建議加入 --emptyOutDir 確保 dist 資料夾乾淨
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
